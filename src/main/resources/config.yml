# ThwNewPillar 配置文件
# 这是示例配置文件，请根据实际情况修改

# 服务器名称设置 (显示在侧边栏底部)
server:
  # 服务器显示名称 (支持颜色代码 §)
  # 示例: "§d§l我的服务器" = 粉色加粗"我的服务器"
  name: "§d§l幸运之柱"
  # 服务器名称颜色代码
  color: "§d"
  # 是否加粗显示
  bold: true

# 调试模式
debug:
  # 是否启用详细事件日志输出
  enabled: false
  # 是否输出事件系统详细日志
  event_logs: false

# MySQL数据库配置
# 请修改为你的数据库信息
mysql:
  # 数据库主机地址
  host: localhost
  # 数据库端口
  port: 3306
  # 数据库名称
  database: lucky_pillar
  # 数据库用户名
  username: root
  # 数据库密码 (必须修改!)
  password: your_password_here

# 计时器设置 (秒)
timers:
  # 物品发放间隔
  loot_time: 10
  # 事件触发间隔
  event_time: 60
  # 边界收缩间隔（首次收缩前的等待时间）
  border_time: 51
  # 游戏开始倒计时
  begin_time: 10

# 边界收缩设置
border:
  # 初始边界大小
  initial_size: 80
  # 每次收缩的格数
  shrink_amount: 5
  # 收缩动画持续时间（秒）
  shrink_duration: 30
  # 收缩间隔（秒）
  shrink_interval: 21
  # 停止收缩的边界大小（小于此值进入平台崩溃）
  min_size: 10

# 游戏设置
game:
  # 是否启用自动开始功能
  auto-start-enabled: true
  # 自动开始所需的最少玩家数量
  auto-start-min-players: 2

# 大厅设置
# 玩家等待游戏的位置
lobby:
  x: 100
  y: 4
  z: 100

# 柱子设置
pillar:
  # 柱子高度
  height: 39
  # 笼子高度
  cage_height: 3

# 地图区域设置 (游戏区域)
map_region:
  # 中心点 (游戏区域中心)
  center_x: 0
  center_y: 0
  center_z: 0
  # 区域半径
  radius: 50
  # 最低Y坐标
  min_y: -64
  # 最高Y坐标
  max_y: 320

# 柱子倒塌设置
collapse:
  # 是否启用柱子倒塌
  enabled: true
  # 游戏开始后多久开始倒塌 (秒)
  start_delay: 60
  # 倒塌间隔 (秒)
  interval: 10
  # 每次倒塌破坏的方块数
  blocks_per_tick: 3
